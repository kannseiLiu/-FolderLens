name: Xcode

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build and Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          if [ -d /Applications/Xcode_16.2.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app
          fi
          xcodebuild -version

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project RunBoard/RunBoard.xcodeproj \
            -scheme RunBoard \
            -destination 'platform=macOS' \
            -only-testing:RunBoardTests
